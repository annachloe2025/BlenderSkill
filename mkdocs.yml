site_name: BlenderSkill
site_description: AIにBlenderスキルを段階的に蓄積させる学習プロジェクト
site_url: https://annachloe2025.github.io/BlenderSkill/
repo_url: https://github.com/annachloe2025/BlenderSkill
repo_name: annachloe2025/BlenderSkill
edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切替
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans JP
    code: JetBrains Mono

plugins:
  - search:
      lang: ja

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - ホーム: index.md
  - いまのタスク: tasks.md
  - 学習ログ: log.md
  - ノウハウ:
      - 概要: memory/index.md
      - 基本操作: memory/basics.md
      - モデリング: memory/modeling.md
      - マテリアル: memory/materials.md
      - ライティング: memory/lighting.md
      - アニメーション・応用: memory/animation.md
      - キャラクター・ポージング: memory/character.md
  - スニペット集:
      - 一覧: snippets/index.md
      - シーン全消し: snippets/clear_scene.md
      - 5プリミティブ配置: snippets/add_primitives_row.md
      - トランスフォーム基本: snippets/transform_basics.md
      - グリッド配置: snippets/grid_arrangement.md
      - モディファイア入門: snippets/modifiers_intro.md
      - シーン管理ユーティリティ: snippets/scene_utils.md
      - bmesh の基本: snippets/bmesh_basics.md
      - 押し出しで階段: snippets/extrude_stairs.md
      - ループカット+ベベル: snippets/loopcut_bevel_box.md
      - シンプルな椅子: snippets/simple_chair.md
      - ブーリアンで穴あけ: snippets/boolean_hole.md
      - マテリアル基本: snippets/material_basics.md
      - プロシージャル木目: snippets/procedural_wood_node_graph.md
      - UV展開（Smart Project）: snippets/uv_unwrap_smart.md
      - ライト4種比較: snippets/light_comparison.md
      - 環境光（Sky Texture）: snippets/sky_environment.md
      - Cycles vs Eevee: snippets/cycles_vs_eevee.md
      - カメラ被写界深度: snippets/camera_dof.md
      - キーフレームアニメ: snippets/keyframe_animation.md
      - 雪片散布: snippets/snow_scatter.md
      - ジオメトリノード散布: snippets/geometry_nodes_scatter.md
      - AI生成・外部アセット: snippets/ai_model_workflow.md
      - "🎉 集大成: 雪景色の椅子": snippets/final_snowy_chair.md
      - キャラ・セットアップ: snippets/character_setup.md
      - キャラ・複数ポーズ一括レンダー: snippets/character_render_poses.md
      - VRoid→FBX(Mixamo向け): snippets/vrm_to_fbx_for_mixamo.md
      - HTMLギャラリー生成: snippets/generate_gallery.md

copyright: "&copy; 2026 annachloe2025"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/annachloe2025/BlenderSkill
